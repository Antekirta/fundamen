version: '3.8'

services:
  nuxt:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
    command: ["nuxt", "dev"]

  nest:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:3000"
    volumes:
      - ./server:/app
    command: ["npm", "run", "start"]
